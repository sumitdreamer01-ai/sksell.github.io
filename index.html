<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Sell</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:linear-gradient(90deg,#ff6600,#ff9900);
color:white;
text-align:center;
padding:25px;
}

header h1{
font-size:35px;
}

header p{
font-size:18px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
border-radius:15px;
padding:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.2);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin:10px 0;
}

.price{
color:red;
font-size:22px;
font-weight:bold;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px 20px;
border-radius:30px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}
</style>

</head>
