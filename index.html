<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Sell</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff6600;
color:#fff;
padding:20px;
text-align:center;
}

header h1{
font-size:32px;
}

.search{
padding:15px;
text-align:center;
}

.search input{
width:90%;
max-width:450px;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#fff;
border-radius:12px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
text-align:center;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.price{
color:red;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px 18px;
border-radius:30px;
cursor:pointer;
font-size:16px;
}

footer{
background:#222;
color:#fff;
padding:20px;
text-align:center;
margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>🛍️ SK Sell</h1>
<p>Best Deals | WhatsApp Order</p>
</header>

<div class="search">
<input type="text" id="search" placeholder="Search Products...">
</div>

<section class="products" id="products">
  </section>

<footer>
  <h2>📞 WhatsApp: 8709033711</h2>
  <p>© 2026 SK Sell | Online Store</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "sksellsman.firebaseapp.com",
  projectId: "sksellsman",
  storageBucket: "sksellsman.firebasestorage.app",
  messagingSenderId: "352576440091",
  appId: "1:352576440091:web:c26b8daf51b1ec4fb335be"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const products = document.getElementById("products");
const search = document.getElementById("search");

let allProducts = [];

async function loadProducts() {
  const snap = await getDocs(collection(db, "Products"));

  snap.forEach((doc) => {
    allProducts.push(doc.data());
  });

  showProducts(allProducts);
}

function showProducts(list) {
  products.innerHTML = "";

  list.forEach((p) => {
    products.innerHTML += `
      <div class="card">
        <img src="${p.Image}" alt="${p.Name}">
        <h3>${p.Name}</h3>
        <p class="price">₹${p.Price}</p>
        <a href="https://wa.me/918709033711?text=I want to order ${encodeURIComponent(p.Name)}">
          <button>Order on WhatsApp</button>
        </a>
      </div>
    `;
  });
}

search.addEventListener("input", () => {
  const text = search.value.toLowerCase();
  showProducts(
    allProducts.filter(p =>
      p.Name.toLowerCase().includes(text)
    )
  );
});

loadProducts();
  </script>

</body>
</html>
