<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Sell</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:linear-gradient(90deg,#ff6600,#ff9900);
color:#fff;
text-align:center;
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#fff;
border-radius:12px;
padding:15px;
box-shadow:0 5px 10px rgba(0,0,0,.15);
text-align:center;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.price{
color:red;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px 20px;
border-radius:30px;
font-size:16px;
cursor:pointer;
}

footer{
background:#222;
color:#fff;
text-align:center;
padding:20px;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>🛍️ SK Sell</h1>
<p>Best Deals | WhatsApp Order</p>
</header>

<section class="products" id="products">
</section>

<footer>
<h2>WhatsApp : 8709033711</h2>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "sksellsman.firebaseapp.com",
  projectId: "sksellsman",
  storageBucket: "sksellsman.firebasestorage.app",
  messagingSenderId: "352576440091",
  appId: "1:352576440091:web:c26b8daf51b1ec4fb335be"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const productsDiv = document.getElementById("products");

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "Products"));

  querySnapshot.forEach((doc) => {
    const p = doc.data();

    productsDiv.innerHTML += `
      <div class="card">
        <img src="${p.Image}">
        <h3>${p.Name}</h3>
        <p class="price">₹${p.Price}</p>
        <a href="https://wa.me/918709033711?text=I want to order ${encodeURIComponent(p.Name)}">
          <button>Order on WhatsApp</button>
        </a>
      </div>
    `;
  });
}

loadProducts();
</script>

</body>
</html>
